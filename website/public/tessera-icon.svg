<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- 3x3 grid of tessera tiles — centre tile sealed/accent, rest dim -->

  <!-- Row 1 -->
  <rect x="0"  y="0"  width="11" height="11" fill="#1E1E22" rx="1"/>
  <rect x="14" y="0"  width="11" height="11" fill="#1E1E22" rx="1"/>
  <rect x="28" y="0"  width="12" height="11" fill="#1E1E22" rx="1"/>

  <!-- Row 2 -->
  <rect x="0"  y="14" width="11" height="11" fill="#1E1E22" rx="1"/>
  <!-- Centre tile — the sealed tessera -->
  <rect x="14" y="14" width="11" height="11" fill="#E8FF47" rx="1"/>
  <rect x="28" y="14" width="12" height="11" fill="#1E1E22" rx="1"/>

  <!-- Row 3 -->
  <rect x="0"  y="28" width="11" height="12" fill="#1E1E22" rx="1"/>
  <rect x="14" y="28" width="11" height="12" fill="#1E1E22" rx="1"/>
  <rect x="28" y="28" width="12" height="12" fill="#1E1E22" rx="1"/>
</svg>
